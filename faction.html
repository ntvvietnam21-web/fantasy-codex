<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Phe Phái | Fantasy Chronicle</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="fantasy-theme">

    <div class="container">
        <div class="page-header">
            <h2 class="cinzel-font">Thiết Lập Thế Lực</h2>
            <p class="subtitle">Ghi danh bang hội vào sử thi của bạn</p>
        </div>

        <form id="factionForm" onsubmit="event.preventDefault(); saveFaction();">
            
            <div class="form-card visual-inputs">
                <div class="banner-upload">
                    <label>Ảnh Banner Phe Phái</label>
                    <div class="drop-zone" id="bannerDropZone" onclick="document.getElementById('factionBanner').click()">
                        <img id="prevBanner" src="https://i.imgur.com/eE6C6Wv.png">
                        <input type="file" id="factionBanner" accept="image/*" hidden onchange="previewImg(this, 'prevBanner')">
                    </div>
                </div>
                <div class="icon-upload">
                    <div class="drop-zone-circle" id="iconDropZone" onclick="document.getElementById('factionIcon').click()">
                        <img id="prevIcon" src="https://i.imgur.com/6X8FQyA.png">
                        <input type="file" id="factionIcon" accept="image/*" hidden onchange="previewImg(this, 'prevIcon')">
                    </div>
                </div>
            </div>

            <div class="form-grid-layout">
                <div class="form-column">
                    <div class="form-card">
                        <h3 class="section-title"><i class="fa-solid fa-crown"></i> Thông tin cơ bản</h3>
                        <div class="form-group">
                            <label>Tên phe phái</label>
                            <input type="text" id="factionName" placeholder="VD: Hội Tam Điểm">
                        </div>
                        <div class="form-group">
                            <label>Thủ lĩnh</label>
                            <input type="text" id="factionLeader" placeholder="Tên vương/vua">
                        </div>
                        <div class="form-group">
                            <label>Ngày thành lập</label>
                            <input type="date" id="factionFounded">
                        </div>
                    </div>

                    <div class="form-card">
                        <h3 class="section-title"><i class="fa-solid fa-map-location-dot"></i> Lãnh thổ & Quy mô</h3>
                        <div class="form-group">
                            <label>Trụ sở chính</label>
                            <input type="text" id="factionHQ">
                        </div>
                        <div class="grid-2">
                            <div class="form-group">
                                <label>Quy mô</label>
                                <select id="factionScale">
                                    <option value="Bí mật">Bí mật</option>
                                    <option value="Địa phương">Địa phương</option>
                                    <option value="Toàn lục địa">Toàn lục địa</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Sức mạnh (Power)</label>
                                <input type="number" id="factionPower">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-column">
                    <div class="form-card">
                        <h3 class="section-title"><i class="fa-solid fa-handshake"></i> Chính trị</h3>
                        <div class="form-group">
                            <label>Đồng minh</label>
                            <input type="text" id="factionAllies" placeholder="Các phe hữu hảo">
                        </div>
                        <div class="form-group">
                            <label>Kẻ thù</label>
                            <input type="text" id="factionEnemies" placeholder="Các phe đối địch">
                        </div>
                    </div>

                    <div class="form-card">
                        <h3 class="section-title"><i class="fa-solid fa-scroll"></i> Worldbuilding</h3>
                        <div class="form-group">
                            <label>Mục tiêu & Tư tưởng</label>
                            <div class="dual-inputs">
                                <input type="text" id="factionGoal" placeholder="Mục tiêu">
                                <input type="text" id="factionIdeology" placeholder="Tư tưởng">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Mô tả chi tiết</label>
                            <textarea id="factionDesc" rows="5"></textarea>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <button type="button" class="btn-outline" onclick="history.back()">Quay lại</button>
                <button type="submit" class="btn-primary">Lưu Phe Phái</button>
            </div>
        </form>

        <hr class="fancy-hr">

        <section id="factionPage" class="hidden">
            <div class="profile-header">
                <div class="banner-wrapper">
                    <img id="factionPageBanner">
                    <div class="overlay"></div>
                </div>
                <div class="identity-block">
                    <img id="factionPageIcon">
                    <div class="identity-text">
                        <h2 id="factionPageName" class="cinzel-font"></h2>
                        <span id="factionPageScaleBadge" class="badge"></span>
                    </div>
                </div>
            </div>

            <div class="profile-content">
                <aside class="side-info">
                    <div class="info-box">
                        <label>Thủ lĩnh</label>
                        <p id="factionPageLeader"></p>
                    </div>
                    <div class="info-box">
                        <label>Trụ sở</label>
                        <p id="factionPageHQ"></p>
                    </div>
                    <div class="info-box">
                        <label>Sức mạnh</label>
                        <div class="power-meter"><div id="powerFill" class="power-fill"></div></div>
                        <p id="factionPagePower"></p>
                    </div>
                </aside>
                
                <main class="main-info">
                    <div class="content-card">
                        <h3>Lịch sử & Tư tưởng</h3>
                        <p id="factionPageDesc"></p>
                        <div class="goal-ideology">
                            <div><strong>Mục tiêu:</strong> <span id="factionPageGoal"></span></div>
                            <div><strong>Tư tưởng:</strong> <span id="factionPageIdeology"></span></div>
                        </div>
                    </div>
                    
                    <div class="content-card">
                        <h3>Thành viên chủ chốt</h3>
                        <div id="factionCharacters" class="character-grid"></div>
                    </div>
                </main>
            </div>
        </section>
    </div>

    <script src="imageDB.js"></script>
    <script src="app.js"></script>
    <script src="factions.js"></script>
    <script>
        // Preview ảnh nhanh khi chọn
        function previewImg(input, targetId) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => document.getElementById(targetId).src = e.target.result;
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</body>
</html>
